name: Publish Release

on:
    push:
        branches:
            - main
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: false

permissions:
    contents: write

jobs:
    publish:
        name: Publish tag and release
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Use Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20.x"

            - name: Resolve release metadata
              id: release
              shell: pwsh
              run: |
                  $package = Get-Content package.json | ConvertFrom-Json
                  "version=$($package.version)" >> $env:GITHUB_OUTPUT
                  "tag=v$($package.version)" >> $env:GITHUB_OUTPUT

            - name: Extract release notes
              run: >
                  node scripts/extract-release-notes.mjs --current
                  --output .release-notes.md

            - name: Create tag if missing
              shell: pwsh
              run: |
                  $tag = "${{ steps.release.outputs.tag }}"
                  $exists = git tag --list $tag
                  if (-not $exists) {
                      git config user.name "github-actions[bot]"
                      git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                      git tag -a $tag -m "Release $tag"
                      git push origin $tag
                  }

            - name: Create or update GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.release.outputs.tag }}
                  name: ${{ steps.release.outputs.tag }}
                  body_path: .release-notes.md
