name: Sync Develop

on:
    push:
        branches:
            - main
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}
    cancel-in-progress: false

permissions:
    contents: write
    pull-requests: write

jobs:
    sync:
        name: Sync main into develop
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  ref: develop
                  fetch-depth: 0

            - name: Merge main into develop
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

                  git fetch origin main:refs/remotes/origin/main
                  git fetch origin develop:refs/remotes/origin/develop
                  git checkout -B develop origin/develop

                  # Check if main has commits not in develop
                  BEHIND=$(git rev-list --count HEAD..origin/main)
                  if [ "$BEHIND" -eq 0 ]; then
                      echo "develop is already up to date with main"
                      exit 0
                  fi

                  # Try fast merge
                  if git merge origin/main --no-edit -m "build(sync): merge main into develop"; then
                      if git push origin HEAD:develop; then
                          echo "Synced $BEHIND commit(s) from main into develop"
                          exit 0
                      fi

                      BRANCH="sync/main-to-develop-$(date +%s)"
                      git checkout -B "$BRANCH"
                      git push origin HEAD:"$BRANCH"
                      gh pr create \
                          --base develop \
                          --head "$BRANCH" \
                          --title "build(sync): merge main into develop" \
                          --body "Automatic sync from main succeeded locally, but the workflow could not push directly to develop. Review and merge this PR to keep release metadata aligned."
                      echo "Created PR because direct push to develop was rejected"
                  else
                      # If merge fails, create a PR for manual resolution
                      git merge --abort
                      BRANCH="sync/main-to-develop-$(date +%s)"
                      git checkout -B "$BRANCH" origin/main
                      git push origin HEAD:"$BRANCH"
                      gh pr create \
                          --base develop \
                          --head "$BRANCH" \
                          --title "build(sync): merge main into develop" \
                          --body "Automatic sync from main found merge conflicts. Resolve this PR to bring the release commit, version bump, and changelog updates back into develop."
                      echo "Created PR for manual sync resolution"
                  fi
