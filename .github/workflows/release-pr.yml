name: Release PR

on:
    push:
        branches:
            - develop
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: write
    pull-requests: write

jobs:
    prepare-release-pr:
        name: Prepare release PR
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  ref: develop
                  fetch-depth: 0
                  fetch-tags: true

            - name: Use Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20.x"

            - name: Fetch release branches
              run: |
                  git fetch origin main:refs/remotes/origin/main
                  git fetch origin develop:refs/remotes/origin/develop

            - name: Prepare release files
              run: >
                  node scripts/prepare-release.mjs --write
                  --range origin/main..origin/develop
                  --manifest .release-manifest.json
                  --notes .release-pr-body.md

            - name: Read release manifest
              id: manifest
              shell: pwsh
              run: |
                  $manifest = Get-Content .release-manifest.json | ConvertFrom-Json
                  "has_changes=$($manifest.hasChanges.ToString().ToLower())" >> $env:GITHUB_OUTPUT
                  "next_version=$($manifest.nextVersion)" >> $env:GITHUB_OUTPUT
                  "next_tag=$($manifest.nextTag)" >> $env:GITHUB_OUTPUT

            - name: Create release branch and PR
              if: steps.manifest.outputs.has_changes == 'true'
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  NEXT_TAG: ${{ steps.manifest.outputs.next_tag }}
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

                  git checkout -B release/main
                  git add package.json CHANGELOG.md
                  git commit -m "build(release): prepare ${NEXT_TAG}"
                  git push --force origin release/main

                  gh label create release --description "Release PR" --color "0E8A16" 2>/dev/null || true

                  EXISTING_PR=$(gh pr list --base main --head release/main --state open --json number --jq '.[0].number // empty')

                  if [ -n "$EXISTING_PR" ]; then
                      gh pr edit "$EXISTING_PR" \
                          --title "release: ${NEXT_TAG}" \
                          --body-file .release-pr-body.md
                  else
                      gh pr create \
                          --base main \
                          --head release/main \
                          --title "release: ${NEXT_TAG}" \
                          --body-file .release-pr-body.md \
                          --label release
                  fi
