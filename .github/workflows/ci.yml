name: CI

on:
    pull_request:
        branches:
            - main
            - develop
    push:
        branches:
            - main
            - develop
            - feature/*

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    quality:
        name: Quality checks
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Use Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20.x"
                  cache: "yarn"

            - name: Install packages
              run: yarn install --frozen-lockfile

            - name: Check formatting
              run: yarn format:check

            - name: Lint
              run: yarn lint

            - name: Type check
              run: yarn compile

            - name: Test with coverage
              run: yarn coverage

    build:
        name: Build production app
        runs-on: ubuntu-latest
        needs: quality
        steps:
            - uses: actions/checkout@v4

            - name: Use Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20.x"
                  cache: "yarn"

            - name: Install packages
              run: yarn install --frozen-lockfile

            - name: Build
              run: yarn build
